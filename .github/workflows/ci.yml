name: enterprise-ci

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Python lint
        run: |
          python -m compileall ai-service/app tests/python

      - name: Frontend lint/typecheck
        run: |
          npm --prefix frontend install
          npm --prefix frontend run lint

      - name: Java compile check
        run: |
          cd backend-java
          mvn -q -DskipTests package

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ai-service/requirements.txt

      - name: Python tests with coverage
        run: ./tests/scripts/run_python_tests.sh

      - name: Java tests with coverage
        run: ./tests/scripts/run_java_tests.sh

      - name: E2E tests (Playwright)
        run: ./tests/scripts/run_e2e_tests.sh

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-coverage
          path: tests/coverage

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - name: Build Docker images
        run: |
          docker build -t rag-react-ai-service:ci ./ai-service
          docker build -t rag-react-backend-java:ci ./backend-java
          docker build -t rag-react-frontend-nginx:ci ./frontend

  docker-push:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push AI service image
        uses: docker/build-push-action@v7
        with:
          context: ./ai-service
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/rag-react-ai-service:latest
            ghcr.io/${{ github.repository_owner }}/rag-react-ai-service:${{ github.sha }}

      - name: Build and push backend image
        uses: docker/build-push-action@v7
        with:
          context: ./backend-java
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/rag-react-backend-java:latest
            ghcr.io/${{ github.repository_owner }}/rag-react-backend-java:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/rag-react-frontend-nginx:latest
            ghcr.io/${{ github.repository_owner }}/rag-react-frontend-nginx:${{ github.sha }}
